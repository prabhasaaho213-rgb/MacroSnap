workflows:
  android-debug:
    name: MacroSnap Debug APK
    instance_type: linux_x2
    max_build_duration: 30
    environment:
      flutter: stable
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build debug APK
        script: flutter build apk --debug
    artifacts:
      - build/app/outputs/**/*.apk